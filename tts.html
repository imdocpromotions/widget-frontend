<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI TTS Alerts</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        
        #tts-popup {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(150px); /* Hidden off bottom */
            background: rgba(10, 10, 14, 0.9);
            border: 2px solid #a970ff;
            box-shadow: 0 0 20px rgba(169, 112, 255, 0.5);
            border-radius: 12px;
            padding: 15px 25px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #tts-popup.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .icon { font-size: 28px; }
        .details { display: flex; flex-direction: column; }
        .title { font-size: 12px; color: #a970ff; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .user { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="tts-popup">
        <div class="icon">🎙️</div>
        <div class="details">
            <span class="title" id="voice-label">Now Speaking: KANYE</span>
            <span class="user" id="user-label">Username</span>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://widget-backend-y2d1.onrender.com';
        const socket = io(BACKEND_URL);
        const popup = document.getElementById('tts-popup');
        const voiceLabel = document.getElementById('voice-label');
        const userLabel = document.getElementById('user-label');

        let isPlaying = false;
        let queue = [];

        socket.on('triggerTTS', (data) => {
            queue.push(data);
            if (!isPlaying) processQueue();
        });

        async function processQueue() {
            if (queue.length === 0) return;
            isPlaying = true;
            
            const current = queue.shift();
            
            // Show the visual popup
            voiceLabel.innerText = `Speaking: ${current.voice.toUpperCase()}`;
            userLabel.innerText = current.user;
            popup.classList.add('show');

            // =========================================================
            // 🛑 INSERT YOUR EXTERNAL AI VOICE LOGIC HERE 🛑
            // Currently using default browser robot voice for testing.
            // Replace the code inside this block when you have your audio URLs.
            // =========================================================
            
            await new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(current.text);
                
                // Temporary pitch tweaks to simulate different characters for testing
                if (current.voice === 'speed') { utterance.pitch = 1.5; utterance.rate = 1.3; }
                if (current.voice === 'trump') { utterance.pitch = 0.8; utterance.rate = 0.9; }
                if (current.voice === 'kanye') { utterance.pitch = 0.5; utterance.rate = 1.0; }

                utterance.onend = resolve;
                window.speechSynthesis.speak(utterance);
            });

            // =========================================================
            
            // Hide popup after speaking
            popup.classList.remove('show');
            
            // Wait 1 second before playing the next TTS in queue
            setTimeout(() => {
                isPlaying = false;
                processQueue();
            }, 1000);
        }
    </script>
</body>
</html>
