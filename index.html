<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 OF CHAT | imdocwidgets</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --primary: #ffcc00;
            --primary-glow: rgba(255, 204, 0, 0.6);
            --bg: rgba(10, 10, 14, 0.85);
            --text: #ffffff;
            --radius: 16px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: transparent; 
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 1);
            overflow: hidden;
        }

        .widget-container {
            background: var(--bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 22px 32px;
            border-radius: var(--radius);
            border: 2px solid rgba(255, 204, 0, 0.45);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.8);
            min-width: 260px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: center; 
            margin-bottom: 24px; /* Given a slight bump so it doesn't touch rank 1 */
            width: 100%;
            position: relative; 
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title-text {
            background: linear-gradient(180deg, #ffffff 0%, #000000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            text-shadow: 0 0 10px #d3a6ff, 0 0 20px #a970ff;
        }

        .subtitle {
            position: absolute;
            top: 100%;
            left: 50%; /* Locks it to the absolute mathematical center */
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .crown-glow {
            filter: drop-shadow(0px 2px 8px var(--primary-glow));
            font-size: 36px;
        }

        .live-indicator {
            width: 10px;
            height: 10px;
            background-color: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff66;
            animation: pulse 1.8s infinite ease-in-out;
            position: absolute; 
            right: 0;
        }

        .chatter-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center; 
            gap: 14px;
            letter-spacing: 0.5px;
        }

        .chatter-list li {
            display: flex;
            align-items: center;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .rank {
            color: var(--primary);
            margin-right: 10px;
            font-weight: 900;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.4);
        }

        .username {
            color: var(--text);
        }

        .status-msg {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            font-style: italic;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(0, 255, 102, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="header-row">
            <h1>
                <span class="crown-glow">👑</span> 
                <span class="title-text">OF CHAT</span>
            </h1>
            <div class="subtitle">(WEEKLY)</div>
            <div class="live-indicator"></div>
        </div>
        <ul class="chatter-list" id="leaderboard">
            <li class="status-msg">Connecting to server...</li>
        </ul>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const twitchChannel = urlParams.get('twitch') || 'imdoclive'; 

        const BACKEND_URL = 'https://widget-backend-y2d1.onrender.com'; 
        
        const socket = io(BACKEND_URL);
        const listElement = document.getElementById('leaderboard');

        socket.on('connect', () => {
            console.log('Connected to Backend!');
            socket.emit('joinChannel', twitchChannel);
        });

        socket.on('updateLeaderboard', (top3) => {
            
            if (!top3 || top3.length === 0) {
                listElement.innerHTML = '<li class="status-msg">No chats yet...</li>';
                return;
            }

            listElement.innerHTML = '';
            top3.forEach(([name, count], index) => {
                const li = document.createElement('li');
                li.style.animationDelay = `${index * 0.1}s`;
                li.innerHTML = `<span class="rank">${index + 1}.</span> <span class="username">${name}</span>`;
                listElement.appendChild(li);
            });
        });

        socket.on('disconnect', () => {
            listElement.innerHTML = '<li class="status-msg" style="color:#ff4444;">Disconnected</li>';
        });
    </script>
</body>
</html>
